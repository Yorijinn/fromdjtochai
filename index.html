<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Chai ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: linear-gradient(to bottom, #fff0f5, #ffe4e1);
  overflow-x: hidden;
  overflow-y: auto;
}

h1 {
  text-align: center;
  margin: 20px;
  color: #b03060;
}

.container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  padding: 20px;
}

.envelope {
  width: 140px;
  height: 100px;
  background: #ffb6c1;
  position: relative;
  border-radius: 8px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.flap {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 50px;
  background: #ff8fab;
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  transform-origin: top;
  transition: transform 0.5s;
}

.envelope.open .flap {
  transform: rotateX(180deg);
}

.locked { opacity: 0.5; }

.letter {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: #fffaf0;
  padding: 25px;
  width: 85%;
  max-width: 340px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  transition: transform 0.4s ease;
  text-align: left;
  font-family: 'Dancing Script', cursive;
  font-size: 20px;
  line-height: 1.6;
  white-space: pre-line;
  max-height: 80vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.letter.show {
  transform: translate(-50%, -50%) scale(1);
}

.close {
  margin-top: 15px;
  cursor: pointer;
  color: #b03060;
  text-align: center;
  font-family: sans-serif;
}

.petal {
  position: absolute;
  width: 10px;
  height: 10px;
  background: pink;
  border-radius: 50%;
  opacity: 0.7;
  animation: fall linear infinite;
}

@keyframes fall {
  0% { transform: translateY(-10px); }
  100% { transform: translateY(100vh); }
}

/* HEART FINAL BUTTON */
.finalHeart {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 60px;
  cursor: pointer;
  display: none;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { transform: translate(-50%, -50%) scale(1); }
  50% { transform: translate(-50%, -50%) scale(1.2); }
  100% { transform: translate(-50%, -50%) scale(1); }
}

</style>
</head>

<body>

<h1>For Chai 💌</h1>

<audio id="bgMusic" autoplay loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3" type="audio/mpeg">
</audio>

<audio id="voiceNote">
  <source src="voice.mp3" type="audio/mpeg">
</audio>

<div class="container" id="container"></div>

<div class="letter" id="letterBox">
  <div id="poemText"></div>
  <div class="close" onclick="closeLetter()">close</div>
</div>

<div class="finalHeart" id="finalHeart" onclick="openFinal()">❤️</div>

<script>
const poems = [
`Chai…
I see the way your chest tightens when the world gets too loud,
when everything feels like it’s moving too fast and you’re trying so hard just to keep up.
And I need you to know this—
I don’t look at you like you’re falling apart.
I look at you like someone who is still standing
in the middle of everything that tries to break you.
And that alone… makes you strong to me.`,

`Chai,
if I could reach into your thoughts when they start turning against you,
I would gently hold every fear that convinces you you’re not enough.
I would sit with it, not fight it,
until it learns to quiet down.
Because I believe there’s a softer place inside you
that deserves more space than your worries ever did.`,

`You don’t have to apologize for the days you feel like you’re too emotional, Chai.
Even the sky breaks into rain when it can’t hold it anymore.
Even the ocean overflows without asking for permission.
So why should you punish yourself for feeling deeply?
To me, your emotions are not a problem—they are proof you are real.`,

`If your world ever feels like it’s collapsing quietly inside your chest,
I want you to remember something important:
you don’t have to survive those moments alone anymore.
Even if you can’t explain what you’re feeling,
even if everything feels too heavy to put into words,
I will still stay beside you until it becomes easier to breathe again.`,

`Chai,
there is nothing about you that makes me want to walk away.
Not your overthinking, not your silence, not your sudden storms.
If anything, those are the parts that made me understand
you are someone who feels life more deeply than most people ever will.
And I would never call something so real “too much.”`,

`You think you are too heavy sometimes,
too complicated, too difficult to hold.
But Chai…
I don’t feel burdened by you at all.
I feel trusted.
Because letting someone see your chaos
is not weakness—it is honesty.
And I would rather have the real you
than a quiet version that hides everything away.`,

`Chai,
I don’t love you only in the moments you’re okay.
I love you when your voice shakes while you’re trying to explain yourself.
I love you when your thoughts are louder than your peace.
I love you when you feel like you’re losing control inside your own mind.
Because those are the moments I want to stay the closest to you.`,

`If your thoughts ever become too loud at night,
please don’t let them convince you that you have to disappear into them alone.
Come here instead.
We don’t need perfect words.
We don’t need solutions.
We just need time—and I will give you all of mine.`,

`You are not a burden, Chai.
You are a person carrying emotions that most people wouldn’t know how to hold.
That does not make you too much.
That makes you deep, sensitive, and human in the most real way.
And I will never apologize for understanding that about you.`,

`And if there ever comes a moment where you feel like fading away quietly,
I need you to promise yourself one thing first—
come to me before you make any decision about leaving.
Let me remind you, again and again if I have to,
that your existence matters more than the thoughts trying to erase it.`
];

const finalPoem = `❤️\n\nChai…\n\nIf you’re reading this, it means you reached the end of every piece of me.\n\nI love you.\nNot when it’s easy. Not when it’s convenient.\n\nI love you when you’re breaking, when you’re lost, when you feel like disappearing.\n\nBecause losing you is something I would never survive quietly.\n\nSo if you ever feel like you’re too much…\ncome back here.\ncome back to me.\n\nBecause Chai…\nI’m still here.\nAnd I’m not going anywhere.`;

const container = document.getElementById("container");
let openedCount = 0;

for (let i = 0; i < 10; i++) {
  const env = document.createElement("div");
  env.className = "envelope locked";

  const label = document.createElement("div");
  label.innerText = i + 1;
  label.style.position = "absolute";
  label.style.bottom = "5px";
  label.style.right = "8px";
  label.style.color = "white";
  label.style.fontWeight = "bold";

  env.innerHTML = '<div class="flap"></div>';
  env.appendChild(label);

  env.onclick = () => {
    if (i > openedCount) return;
    env.classList.add("open");
    openLetter(i);
    openedCount = Math.max(openedCount, i + 1);

    if (openedCount === 10) {
      document.getElementById("finalHeart").style.display = "block";
    }
  };

  container.appendChild(env);
}

function openLetter(index) {
  document.getElementById("letterBox").classList.add("show");
  document.getElementById("poemText").innerText = poems[index];
}

function openFinal() {
  document.getElementById("letterBox").classList.add("show");
  document.getElementById("poemText").innerText = finalPoem;
  document.getElementById("voiceNote").play();
}

function closeLetter() {
  document.getElementById("letterBox").classList.remove("show");
}

function createPetal() {
  const petal = document.createElement("div");
  petal.className = "petal";
  petal.style.left = Math.random() * window.innerWidth + "px";
  petal.style.animationDuration = (3 + Math.random() * 5) + "s";
  document.body.appendChild(petal);
  setTimeout(() => petal.remove(), 8000);
}
setInterval(createPetal, 300);

</script>

</body>
</html>
